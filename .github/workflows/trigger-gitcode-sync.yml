# 将此文件复制到各 GitHub 仓库的 .github/workflows/trigger-gitcode-sync.yml
# 当该仓库有 push/delete 事件时，自动通知中央调度仓库执行 GitCode 同步
#
# 前置条件：在组织级别配置以下 Secrets（所有仓库可访问）：
#   - APP_ID          GitHub App ID
#   - APP_PRIVATE_KEY GitHub App 私钥
#
# 也可使用 scripts/bootstrap_triggers.py 批量安装

name: Trigger GitCode Sync

on:
  push:
    branches: ["**"]
  delete:
    branches: ["**"]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: NonsensicalHub

      - name: Dispatch sync to central repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/NonsensicalHub/gitcode-sync-config/dispatches" \
            -d "{\"event_type\":\"sync\",\"client_payload\":{\"repo\":\"${{ github.repository }}\",\"event\":\"${{ github.event_name }}\"}}"
